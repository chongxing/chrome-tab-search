<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Search</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <h1><span class="header-icon">🔍</span>Tab Search</h1>
    <div class="subtitle" data-i18n="subtitle">__MSG_subtitle__</div>
  </div>

  <div class="search-container">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-box" id="searchInput" placeholder="__MSG_searchPlaceholder__" autocomplete="off">
    </div>
  </div>

  <div class="sort-controls">
    <button class="sort-btn active" id="sortByWindow" title="__MSG_windowSortTooltip__">
      <span class="sort-icon">🪟</span>
      <span class="sort-text">__MSG_sortByWindow__</span>
    </button>
    <button class="sort-btn" id="sortByTime" title="__MSG_timeSortTooltip__">
      <span class="sort-icon">🕐</span>
      <span class="sort-text">__MSG_sortByTime__</span>
    </button>
  </div>

  <div class="stats" id="stats">__MSG_loading__</div>

  <div class="tab-list" id="tabList">
    <div class="loading">__MSG_loadingTabs__</div>
  </div>

  <div class="shortcut-hint">
    __MSG_shortcutHint__
  </div>

  <script src="popup.js"></script>
</body>
</html>
