<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Search</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <h1><span class="header-icon">🔍</span>Tab Search</h1>
    <div class="subtitle">跨窗口搜索并快速跳转</div>
  </div>

  <div class="search-container">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-box" id="searchInput" placeholder="搜索Tab标题或URL..." autocomplete="off">
    </div>
  </div>

  <div class="sort-controls">
    <button class="sort-btn active" id="sortByWindow" title="按窗口分组">
      <span class="sort-icon">🪟</span>
      <span class="sort-text">窗口</span>
    </button>
    <button class="sort-btn" id="sortByTime" title="按最近访问排序">
      <span class="sort-icon">🕐</span>
      <span class="sort-text">时间</span>
    </button>
  </div>

  <div class="stats" id="stats">正在加载...</div>

  <div class="tab-list" id="tabList">
    <div class="loading">加载中...</div>
  </div>

  <div class="shortcut-hint">
    <kbd>Ctrl/⌘</kbd> + <kbd>Shift</kbd> + <kbd>T</kbd> 快速打开 | ↑↓ 选择 | Enter 跳转 | Esc 关闭
  </div>

  <script src="popup.js"></script>
</body>
</html>
